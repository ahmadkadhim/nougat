<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nougat</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 300px; margin: 12px; }
      button { width: 100%; padding: 8px; margin: 4px 0; }
      #status { font-size: 12px; color: #333; margin-top: 8px; white-space: pre-wrap; }
      .hint { font-size: 11px; color: #666; margin-top: 8px; }
    </style>
  </head>
  <body>
    <button id="captureCurrent">Capture Current Tab</button>
    <button id="captureSelected">Capture Selected Tabs</button>
    <button id="captureWindow">Capture Current Window Tabs</button>
    <button id="captureAll">Capture All Open Tabs</button>
    <button id="flushQueue">Flush Retry Queue</button>
    <div id="status">Waiting...</div>
    <div class="hint">Configure API URL + token in extension options. Non-web tabs are skipped automatically.</div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
